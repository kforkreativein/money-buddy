<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Money Buddy logo</title>
  <desc id="desc">A soft pastel clay coin.</desc>
  <defs>
    <linearGradient id="tile" x1="96" x2="416" y1="72" y2="440" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF7ED"/>
      <stop offset="0.58" stop-color="#FDE68A"/>
      <stop offset="1" stop-color="#DDD6FE"/>
    </linearGradient>
    <linearGradient id="coin" x1="162" x2="350" y1="136" y2="376" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FDE68A"/>
      <stop offset="1" stop-color="#FBBF24"/>
    </linearGradient>
    <filter id="tileShadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="12" dy="16" stdDeviation="16" flood-color="#7C2D12" flood-opacity="0.13"/>
      <feDropShadow dx="-8" dy="-8" stdDeviation="10" flood-color="#FFFFFF" flood-opacity="0.9"/>
    </filter>
    <filter id="coinShadow" x="-25%" y="-25%" width="150%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="9" dy="12" stdDeviation="10" flood-color="#92400E" flood-opacity="0.16"/>
      <feDropShadow dx="-5" dy="-6" stdDeviation="8" flood-color="#FFFFFF" flood-opacity="0.78"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="128" fill="url(#tile)" filter="url(#tileShadow)"/>
  <circle cx="256" cy="256" r="136" fill="#FEF3C7" opacity="0.42"/>
  <circle cx="256" cy="256" r="118" fill="url(#coin)" filter="url(#coinShadow)"/>
  <circle cx="256" cy="256" r="92" fill="none" stroke="#FFF7ED" stroke-width="18" opacity="0.66"/>
  <circle cx="256" cy="256" r="34" fill="#FFF7ED" opacity="0.55"/>
  <path fill="#FFFFFF" d="M187 171c23-28 59-45 98-45 9 0 16 7 16 16s-7 16-16 16c-30 0-58 13-76 35-6 7-16 8-23 3-7-6-7-17 1-25Z" opacity="0.5"/>
